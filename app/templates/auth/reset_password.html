<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Levvi's Furniture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="font-admin-sans bg-white text-navy min-h-screen flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <p class="font-admin-display text-2xl font-semibold mb-1">Levvi's Furniture</p>
            <h1 class="text-xl font-admin-display font-semibold mt-6 mb-2">Set a New Password</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-navy/5 p-8">
            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="mb-4 p-3 rounded-xl text-sm {{ 'bg-red-50 text-red-700' if category == 'error' else 'bg-navy/5 text-navy' }}">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">New Password</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full border border-navy/15 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/20 focus:border-navy transition">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1.5">Confirm New Password</label>
                    <input type="password" name="confirm_password" required minlength="6"
                           class="w-full border border-navy/15 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/20 focus:border-navy transition">
                </div>

                <button type="submit"
                        class="w-full bg-navy text-white py-3.5 rounded-xl font-semibold hover:bg-navy/90 transition">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
