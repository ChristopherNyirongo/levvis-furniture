{% extends 'base.html' %}
{% block title %}Request a Quote - Levvi's Furniture{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-16">
    <h1 class="text-3xl font-bold mb-2 text-center">Request a Quote</h1>
    <p class="text-gray-500 text-center mb-8">Tell us what you need, and we'll get back to you with pricing.</p>

    <form method="POST" class="bg-white rounded-lg shadow p-8 space-y-4">

        <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <input type="text" name="customer_name" required
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Phone Number</label>
                <input type="tel" name="phone_number" required
                       class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email"
                       class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Product (optional)</label>
            <select name="product_id" class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
                <option value="">General inquiry / custom furniture</option>
                {% for product in products %}
                <option value="{{ product.id }}">{{ product.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Quantity</label>
            <input type="number" name="quantity" min="1" value="1" required
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Delivery Address</label>
            <input type="text" name="delivery_address"
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Additional Notes</label>
            <textarea name="notes" rows="4" placeholder="Describe what you're looking for..."
                      class="w-full border border-gray-300 rounded px-3 py-2 text-sm"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-gray-900 text-white py-3 rounded font-medium hover:bg-gray-700 transition">
            Submit Quote Request
        </button>
    </form>
</div>
{% endblock %}
